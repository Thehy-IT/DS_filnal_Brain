[pytest]
# Project root (where conftest.py lives)
testpaths = tests

# Show verbose output + short traceback
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:logging

# Custom markers
markers =
    slow: marks tests as slow (model download / GPU) — skip with -m "not slow"
    integration: marks integration tests requiring a running server

# Ignore venv and DAKHDL folder
norecursedirs =
    venv
    .venv
    DAKHDL
    .git
    node_modules
    __pycache__
    .next
