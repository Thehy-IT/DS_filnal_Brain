version: '3.8'

services:
  inference-api:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    restart: always

  clinical-dashboard:
    build:
      context: ../
      dockerfile: deploy/docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
    depends_on:
      - inference-api
    restart: always

  pacs-server:
    image: jodogne/orthanc
    ports:
      - "4242:4242"
      - "8042:8042"
    volumes:
      - ./pacs/orthanc.json:/etc/orthanc/orthanc.json:ro
    restart: always
